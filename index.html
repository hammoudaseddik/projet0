<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <style>
        :root { --cream: #F5F0E8; --black: #111; --rose: #B76E79; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--black); overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Loader */
        #loader { position: fixed; inset: 0; background: var(--cream); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 1px solid var(--black); animation: flip 1.2s infinite ease-in-out; }
        @keyframes flip { 0% { transform: perspective(120px) rotateX(0deg) rotateY(0deg); } 50% { transform: perspective(120px) rotateX(-180.1deg) rotateY(0deg); } 100% { transform: perspective(120px) rotateX(-180deg) rotateY(-179.9deg); } }

        /* Nav */
        nav { padding: 2rem 5%; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; z-index: 10; }
        .cart { position: relative; font-size: 1.2rem; }
        .badge { position: absolute; top: -8px; right: -8px; background: var(--rose); color: white; font-size: 0.7rem; border-radius: 50%; padding: 2px 6px; }
        .btn-back { color: var(--black); text-decoration: none; border-bottom: 1px solid var(--black); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}

        /* Hero */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e8dfd1, #F5F0E8); overflow: hidden; position: relative;}
        .hero-text { text-align: center; z-index: 2; }
        .hero-text h1 { font-size: 5rem; font-weight: 600; margin-bottom: 1rem; color: var(--black); }
        .floating-product { position: absolute; width: 250px; height: 350px; background: url('https://images.unsplash.com/photo-1584916201218-f4242ceb4809?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80') center/cover; border-radius: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); animation: float 6s ease-in-out infinite; }
        .p1 { left: 10%; top: 20%; animation-delay: 0s; }
        .p2 { right: 10%; bottom: 20%; animation-delay: -3s; background: url('https://images.unsplash.com/photo-1548036328-c9fa89d128fa?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80') center/cover; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        /* Shop Grid */
        section { padding: 6rem 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        .card { perspective: 1000px; cursor: pointer; }
        .card-inner { background: white; padding: 1rem; border-radius: 10px; transition: transform 0.4s; transform-style: preserve-3d; }
        .card:hover .card-inner { transform: translateY(-10px) rotateX(5deg); box-shadow: 0 15px 30px rgba(183, 110, 121, 0.2); }
        .card img { width: 100%; height: 400px; object-fit: cover; border-radius: 5px; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }

        .btn-rose { background: var(--rose); color: white; padding: 1rem 3rem; text-decoration: none; display: inline-block; margin-top: 2rem; border-radius: 3px; font-weight: 300; letter-spacing: 2px;}
        
        .float-btn { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; text-decoration: none; z-index: 100; animation: pulse 2s infinite;}
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); } 70% { box-shadow: 0 0 0 20px rgba(0,0,0,0); } }
    /* --- RESPONSIVE OVERRIDES --- */
img { max-width: 100%; height: auto; display: block; }
section { padding: clamp(4rem, 8vw, 8rem) 5%; }
.hero-text h1 { font-size: clamp(3rem, 8vw, 6rem); }
.grid { grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr)); }
nav { flex-wrap: wrap; padding: clamp(1rem, 3vw, 2rem) 5%; gap: 1rem; }
.floating-product { width: clamp(120px, 30vw, 250px); height: auto; aspect-ratio: 5/7; }
.float-btn { width: clamp(50px, 8vw, 60px); height: clamp(50px, 8vw, 60px); font-size: clamp(1.5rem, 4vw, 2rem); }

@media (max-width: 768px) {
    .floating-product { opacity: 0.2; }
    .hero-text { margin-top: 50px; }
}
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <nav>
        <a href="index.html" class="btn-back">← Back</a>
        <h2 style="font-size: 2rem; font-weight: 600; letter-spacing: 3px;">LUXE</h2>
        <div class="cart"><i class="fas fa-shopping-bag"></i><span class="badge">2</span></div>
    </nav>

    <header class="hero">
        <div class="floating-product p1" data-aos="fade-right"></div>
        <div class="floating-product p2" data-aos="fade-left"></div>
        <div class="hero-text" data-aos="fade-up">
            <h1>The Fall Collection</h1>
            <p style="letter-spacing: 3px; text-transform: uppercase;">Elegance redefined.</p>
            <a href="#shop" class="btn-rose">Explore</a>
        </div>
    </header>

    <section id="shop">
        <h2 style="font-size: 3rem; margin-bottom: 3rem; text-align: center;">Curated Selection</h2>
        <div class="grid">
            <div class="card" data-aos="fade-up">
                <div class="card-inner">
                    <div style="overflow: hidden;"><img src="https://images.unsplash.com/photo-1591561954557-26941169b49e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Velvet Clutch Bag"></div>
                    <h3 style="margin-top: 1.5rem; font-size: 1.5rem;">Velvet Clutch</h3>
                    <p style="color: var(--rose); margin-top: 0.5rem;">$1,250</p>
                </div>
            </div>
            <div class="card" data-aos="fade-up" data-aos-delay="100">
                <div class="card-inner">
                    <div style="overflow: hidden;"><img src="https://images.unsplash.com/photo-1608248543803-ba4f8c70ae0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Shoes"></div>
                    <h3 style="margin-top: 1.5rem; font-size: 1.5rem;">Onyx Stilettos</h3>
                    <p style="color: var(--rose); margin-top: 0.5rem;">$890</p>
                </div>
            </div>
            <div class="card" data-aos="fade-up" data-aos-delay="200">
                <div class="card-inner">
                    <div style="overflow: hidden;"><img src="https://images.unsplash.com/photo-1584916201218-f4242ceb4809?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Perfume"></div>
                    <h3 style="margin-top: 1.5rem; font-size: 1.5rem;">Signature Essence</h3>
                    <p style="color: var(--rose); margin-top: 0.5rem;">$320</p>
                </div>
            </div>
        </div>
    </section>

    <a href="https://wa.me/212701559357" target="_blank" class="float-btn"><i class="fab fa-whatsapp"></i></a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        window.addEventListener('load', () => {
            document.getElementById('loader').style.display = 'none';
            AOS.init({ duration: 1000, once: true });
        });
    </script>
</body>
</html>
